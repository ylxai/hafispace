version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: Next.js 15 (App Router)
  - ui_library: TailwindCSS
  - other: React Query, Prisma, NextAuth, Cloudinary, Ably, Resend, Zod

routes:
  - path: /login
    file: src/app/login/page.tsx
    auth_required: false
    description: Halaman login vendor
  - path: /admin
    file: src/app/admin/page.tsx
    auth_required: true
    description: Dashboard admin utama
  - path: /admin/events
    file: src/app/admin/events/page.tsx
    auth_required: true
    description: Manajemen booking/events
  - path: /admin/events/[id]
    file: src/app/admin/events/[id]/page.tsx
    auth_required: true
    description: Detail booking
  - path: /admin/galleries
    file: src/app/admin/galleries/page.tsx
    auth_required: true
    description: Manajemen gallery foto
  - path: /admin/packages
    file: src/app/admin/packages/page.tsx
    auth_required: true
    description: Manajemen paket foto
  - path: /admin/clients
    file: src/app/admin/clients/page.tsx
    auth_required: true
    description: Manajemen klien
  - path: /admin/settings
    file: src/app/admin/settings/page.tsx
    auth_required: true
    description: Pengaturan studio
  - path: /booking
    file: src/app/booking/page.tsx
    auth_required: false
    description: Form booking publik untuk klien
  - path: /gallery/[token]
    file: src/app/gallery/[token]/page.tsx
    auth_required: false
    description: Gallery publik untuk klien memilih foto
  - path: /invoice/[kodeBooking]
    file: src/app/invoice/[kodeBooking]/page.tsx
    auth_required: false
    description: Invoice publik untuk klien

features:
  - name: Login Vendor
    description: Login dengan email dan password
    files:
      - src/app/login/page.tsx
      - src/lib/auth/options.ts
    entry_route: /login
    user_interactions:
      - Fill email input
      - Fill password input
      - Click login button
      - See error on invalid credentials
      - Redirect to /admin on success
    api_calls:
      - method: POST
        endpoint: /api/auth/callback/credentials
    auth_required: false

  - name: Dashboard Admin
    description: Overview metrics studio
    files:
      - src/app/admin/page.tsx
      - src/lib/services/metrics.service.ts
      - src/app/api/admin/metrics/route.ts
    entry_route: /admin
    user_interactions:
      - View total bookings, omset, clients
      - View revenue chart 6 bulan
      - View upcoming sessions bulan ini
      - View recent bookings
    api_calls:
      - method: GET
        endpoint: /api/admin/metrics
    auth_required: true

  - name: Manajemen Booking
    description: List, filter, search, create, delete booking
    files:
      - src/app/admin/events/page.tsx
      - src/app/admin/events/_components/payment-modal.tsx
      - src/app/admin/events/_components/create-booking-modal.tsx
    entry_route: /admin/events
    user_interactions:
      - View list booking dengan filter status
      - Filter by tanggal sesi
      - Search by nama klien atau kode booking
      - Click Tambah Booking untuk buat booking baru
      - Fill form nama klien, HP, paket, tanggal, lokasi
      - Click Bayar untuk catat pembayaran
      - Click Export CSV untuk download data
      - Bulk select dan delete bookings
    api_calls:
      - method: GET
        endpoint: /api/admin/events
      - method: POST
        endpoint: /api/admin/events
      - method: DELETE
        endpoint: /api/admin/events/bulk
    auth_required: true

  - name: Detail Booking
    description: Detail lengkap booking
    files:
      - src/app/admin/events/[id]/page.tsx
      - src/app/api/admin/bookings/[id]/route.ts
    entry_route: /admin/events/[id]
    user_interactions:
      - View info booking tanggal lokasi paket klien
      - View riwayat pembayaran
      - Catat pembayaran baru
      - Update status booking
      - Copy link invoice
      - View galleries yang terhubung
    api_calls:
      - method: GET
        endpoint: /api/admin/bookings/[id]
      - method: PATCH
        endpoint: /api/admin/bookings/[id]
      - method: POST
        endpoint: /api/admin/bookings/[id]/payments
    auth_required: true

  - name: Manajemen Gallery
    description: Buat gallery, upload foto, edit, share link ke klien
    files:
      - src/app/admin/galleries/page.tsx
      - src/app/admin/galleries/_components/upload-photos-modal.tsx
      - src/app/admin/galleries/_components/edit-gallery-modal.tsx
    entry_route: /admin/galleries
    user_interactions:
      - View list gallery dengan status
      - Click Buat Gallery baru
      - Upload foto drag and drop max 15MB
      - Edit nama gallery dan status
      - Copy link gallery untuk klien
      - View selections yang sudah dipilih klien
      - Bulk delete gallery
    api_calls:
      - method: GET
        endpoint: /api/admin/galleries
      - method: POST
        endpoint: /api/admin/galleries
      - method: POST
        endpoint: /api/admin/galleries/[id]/upload
      - method: PATCH
        endpoint: /api/admin/galleries/[id]
      - method: DELETE
        endpoint: /api/admin/galleries/[id]
    auth_required: true

  - name: Gallery Publik Klien
    description: Klien melihat dan memilih foto dari gallery
    files:
      - src/app/gallery/[token]/page.tsx
      - src/app/api/public/gallery/[token]/route.ts
      - src/app/api/public/gallery/[token]/select/route.ts
    entry_route: /gallery/[token]
    user_interactions:
      - View semua foto gallery dengan pagination
      - Click foto untuk select atau deselect
      - View jumlah foto yang dipilih vs kuota
      - See error jika melebihi kuota
    api_calls:
      - method: GET
        endpoint: /api/public/gallery/[token]
      - method: POST
        endpoint: /api/public/gallery/[token]/select
    auth_required: false

  - name: Form Booking Publik
    description: Klien isi form booking online
    files:
      - src/app/booking/page.tsx
      - src/app/booking/_components/booking-form-content.tsx
      - src/app/api/public/booking/route.ts
    entry_route: /booking
    user_interactions:
      - Pilih paket foto
      - Fill nama HP email
      - Pilih tanggal sesi
      - Fill custom fields jika ada
      - Setuju syarat dan ketentuan
      - Submit form booking
      - See konfirmasi booking berhasil
    api_calls:
      - method: GET
        endpoint: /api/public/booking
      - method: POST
        endpoint: /api/public/booking
    auth_required: false

  - name: Invoice Publik
    description: Klien lihat dan print invoice
    files:
      - src/app/invoice/[kodeBooking]/page.tsx
      - src/app/api/public/invoice/[kodeBooking]/route.ts
    entry_route: /invoice/[kodeBooking]
    user_interactions:
      - View detail invoice klien paket pembayaran
      - Click Print untuk cetak invoice
    api_calls:
      - method: GET
        endpoint: /api/public/invoice/[kodeBooking]
    auth_required: false

  - name: Manajemen Paket
    description: CRUD paket foto dengan harga kuota edit include cetak
    files:
      - src/app/admin/packages/page.tsx
      - src/app/api/admin/packages/route.ts
    entry_route: /admin/packages
    user_interactions:
      - View list paket
      - Buat paket baru nama kategori harga kuota edit
      - Edit paket
      - Delete paket
    api_calls:
      - method: GET
        endpoint: /api/admin/packages
      - method: POST
        endpoint: /api/admin/packages
      - method: PATCH
        endpoint: /api/admin/packages/[id]
      - method: DELETE
        endpoint: /api/admin/packages/[id]
    auth_required: true

  - name: Pengaturan Studio
    description: Setup profil studio Cloudinary form booking custom fields Viesus
    files:
      - src/app/admin/settings/page.tsx
      - src/app/admin/settings/_components/studio-profile-panel.tsx
      - src/app/admin/settings/_components/form-booking-panel.tsx
      - src/app/admin/settings/_components/viesus-enhancement-panel.tsx
      - src/app/admin/settings/_components/custom-fields-panel.tsx
    entry_route: /admin/settings
    user_interactions:
      - Edit nama studio logo WA admin
      - Setup Cloudinary credentials
      - Toggle form booking aktif atau nonaktif
      - Set DP percentage
      - Tambah custom fields untuk form booking
      - Toggle Viesus enhancement
    api_calls:
      - method: GET
        endpoint: /api/admin/settings/profile
      - method: PATCH
        endpoint: /api/admin/settings/profile
      - method: GET
        endpoint: /api/admin/settings/cloudinary
      - method: POST
        endpoint: /api/admin/settings/cloudinary
    auth_required: true

known_limitations:
  - issue: Rate limiting tidak ada di public endpoints butuh Upstash
    location: src/app/api/public/
    impact: API bisa di-abuse tanpa throttling
  - issue: Token gallery tidak ada expiry butuh schema migration
    location: prisma/schema.prisma Gallery.clientToken
    impact: Link gallery valid selamanya
  - issue: View count fingerprint cache reset saat server restart
    location: src/app/api/public/gallery/[token]/route.ts
    impact: View count bisa double-count setelah deploy
  - issue: Metrics cache tidak invalidate otomatis saat ada booking baru
    location: src/app/api/admin/metrics/route.ts
    impact: Dashboard bisa terlambat update hingga 5 menit
