configVersion = "2.1"
maxIterations = 0
iterationDelay = 3000
outputDir = ".ralph-tui/iterations"
agent = "kiro"
tracker = "json"
progressFile = ".ralph-tui/progress.md"
autoCommit = false
subagentTracingDetail = "full"
defaultTracker = "json"
defaultAgent = "kiro"

[[agents]]
name = "kiro"
plugin = "kiro"
default = true
command = "kiro-cli"

[agents.options]
[[agents]]
name = "gemini"
plugin = "gemini"
default = false
command = "gemini"

[agents.options]
[[trackers]]
name = "json"
plugin = "json"
default = true

[trackers.options]
path = "prd.json"

[errorHandling]
strategy = "retry"
maxRetries = 2
retryDelayMs = 5000
continueOnNonZeroExit = true

[rateLimitHandling]
enabled = true
maxRetries = 3
baseBackoffMs = 5000
recoverPrimaryBetweenIterations = true

[notifications]
enabled = true
sound = "off"

[parallel]
mode = "auto"
maxWorkers = 2
directMerge = true
